<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The 65 Almanac</title>
  </head>
  <body>
    <header>
      <h1>The 65 Almanac <span class="dev-mode-badge">Dev Mode</span></h1>
      <nav>
        <span class="nav-slider"></span>
        <button class="nav-btn active" data-view="entry">New Game</button>
        <button class="nav-btn" data-view="archive">Archive</button>
        <button class="nav-btn" data-view="stats">Stats</button>
      </nav>
      <div class="header-nav-kebab" id="header-nav-kebab">
        <button type="button" class="header-kebab-btn" aria-label="Options"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"></circle><circle cx="12" cy="12" r="2"></circle><circle cx="19" cy="12" r="2"></circle></svg></button>
        <div class="header-kebab-menu" hidden>
          <button type="button" class="header-kebab-option" data-action="local-only">
            <span class="header-kebab-option-title">Read Supabase</span>
            <span class="header-kebab-option-caption status-indicator" id="local-only-caption" data-status="on" aria-label="On">On</span>
          </button>
          <button type="button" class="header-kebab-option" data-action="exported-data">
            <span class="header-kebab-option-title">Read backup</span>
            <span class="header-kebab-option-caption status-indicator" id="exported-data-caption" data-status="off" aria-label="Off">Off</span>
          </button>
          <span class="header-kebab-option-divider"></span>
          <button type="button" class="header-kebab-option header-kebab-option--danger" data-action="clear-local">
            <span class="header-kebab-option-title">Clear local</span>
          </button>
        </div>
      </div>
    </header>
    <main id="app"></main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
