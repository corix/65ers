<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        document.documentElement.classList.add('theme-loading');
        var theme = localStorage.getItem('65ers_theme');
        var isDark = theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
        var s = document.createElement('style');
        s.id = 'critical-theme';
        s.textContent = 'html.theme-loading header{visibility:hidden}'
          + (isDark
            ? 'html,body{background:#0f0f18}header{color:#b4b0c4}header h1{color:#8b7cb8}.nav-btn{color:#4a6ad9!important;transition:none!important}.nav-btn.active{color:#b4b0c4!important}'
            : 'header{color:#fff!important}.nav-btn{color:#b8d4ff!important;transition:none!important}.nav-btn.active{color:#1a1a2e!important}');
        document.head.appendChild(s);
        requestAnimationFrame(function() {
          document.documentElement.classList.remove('theme-loading');
        });
      })();
    </script>
    <title>The 65 Almanac</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/shared.css">
    <link rel="stylesheet" href="/src/form.css">
  </head>
  <body>
    <header>
      <h1 class="header-title"><span class="demo-mode-badge" id="demo-mode-badge" hidden>DEMO</span>The 65 Almanac</h1>
      <nav>
        <span class="nav-slider"></span>
        <button class="nav-btn active" data-view="entry">New Game</button>
        <button class="nav-btn" data-view="archive">Archive</button>
        <button class="nav-btn" data-view="stats">Stats</button>
      </nav>
      <div class="header-nav-right" id="header-nav-right">
        <button type="button" class="header-bug-btn" id="header-bug-btn" aria-label="Leave feedback"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 9v-1a3 3 0 0 1 6 0v1"/><path d="M8 9h8a6 6 0 0 1 1 3v3a5 5 0 0 1 -10 0v-3a6 6 0 0 1 1 -3"/><path d="M3 13l4 0"/><path d="M17 13l4 0"/><path d="M12 20l0 -6"/><path d="M4 19l3.35 -2"/><path d="M20 19l-3.35 -2"/><path d="M4 7l3.75 2.4"/><path d="M20 7l-3.75 2.4"/></svg></button>
        <div class="header-nav-kebab" id="header-nav-kebab">
        <button type="button" class="header-kebab-btn" aria-label="Options"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"></circle><circle cx="12" cy="12" r="2"></circle><circle cx="19" cy="12" r="2"></circle></svg></button>
        <div class="header-kebab-menu" hidden>
          <div class="header-kebab-option header-kebab-option--theme" data-action="theme" role="button" tabindex="0" aria-pressed="false" aria-label="Dark mode toggle">
            <span class="header-kebab-option-title">Dark mode</span>
            <span class="toggle-slider" id="theme-toggle" aria-hidden="true">
              <span class="toggle-slider-track">
                <span class="toggle-slider-knob"></span>
              </span>
            </span>
          </div>
          <div class="header-kebab-option header-kebab-option--demo-mode" data-action="demo-mode" role="button" tabindex="0" aria-pressed="false" aria-label="Demo toggle">
            <span class="header-kebab-option-title">Demo</span>
            <span class="toggle-slider" id="demo-mode-toggle" aria-hidden="true">
              <span class="toggle-slider-track">
                <span class="toggle-slider-knob"></span>
              </span>
            </span>
          </div>
          <span class="header-kebab-option-divider demo-controls-only" id="demo-controls-divider"></span>
          <button type="button" class="header-kebab-option demo-controls-only" data-action="local-only">
            <span class="header-kebab-option-title">Live source data</span>
            <span class="header-kebab-option-caption status-indicator" id="local-only-caption" data-status="on" aria-label="On">On</span>
          </button>
          <button type="button" class="header-kebab-option demo-controls-only" data-action="exported-data">
            <span class="header-kebab-option-title">Backup data</span>
            <span class="header-kebab-option-caption status-indicator" id="exported-data-caption" data-status="off" aria-label="Off">Off</span>
          </button>
          <span class="header-kebab-option-divider demo-controls-only"></span>
          <button type="button" class="header-kebab-option header-kebab-option--danger demo-controls-only" data-action="clear-local">
            <span class="header-kebab-option-title">Clear demo data</span>
          </button>
          <span class="header-kebab-option-divider sign-in-only" id="sign-in-divider"></span>
          <button type="button" class="header-kebab-option sign-in-only" data-action="sign-in">
            <span class="header-kebab-option-title">Sign in</span>
          </button>
          <span class="header-kebab-option-divider download-backup-only" id="download-backup-divider"></span>
          <button type="button" class="header-kebab-option download-backup-only" data-action="download-backup">
            <span class="header-kebab-option-title" id="download-backup-title">Download archive</span>
            <span class="header-kebab-option-caption" id="download-backup-caption"></span>
          </button>
          <span class="header-kebab-option-divider bugs-only" id="bugs-divider"></span>
          <button type="button" class="header-kebab-option bugs-only" data-action="view-bugs">
            <span class="header-kebab-option-title" id="bugs-title">Feedback</span>
          </button>
          <span class="header-kebab-option-divider sign-out-only" id="sign-out-divider"></span>
          <button type="button" class="header-kebab-option header-kebab-option--danger sign-out-only" data-action="sign-out">
            <span class="header-kebab-option-title">Sign out</span>
          </button>
        </div>
        </div>
      </div>
    </header>
    <main id="app"></main>
    <script>
      (function() {
        var view = localStorage.getItem('65ers_view');
        if (view === 'archive' || view === 'stats') {
          var nav = document.querySelector('nav');
          var btns = document.querySelectorAll('.nav-btn');
          if (nav && btns.length) {
            nav.setAttribute('data-active-view', view);
            btns.forEach(function(b) { b.classList.toggle('active', b.dataset.view === view); });
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
